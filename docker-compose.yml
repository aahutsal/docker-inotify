services:
    inotify:
        image: 'aahutsal/docker-inotify:latest'

        volumes:
          - '/var/run/docker.sock:/tmp/docker.sock:ro'
          - '/var/lib/docker/data/bind/config:/config'
          - 'D:\\WAV:/in'

        environment:
            - 'CONTAINER=bind'
            - 'VOLUMES=/config /in'

        restart: always
